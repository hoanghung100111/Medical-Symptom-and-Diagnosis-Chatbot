version: "3.9"

services:
  medichat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medichat_app
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      # Mount data files (FAISS index + knowledge base) — read-only
      - ./medical_index.faiss:/app/medical_index.faiss:ro
      - ./chatbot_knowledge_updated.json:/app/chatbot_knowledge_updated.json:ro
      # Mount logs directory
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  logs: